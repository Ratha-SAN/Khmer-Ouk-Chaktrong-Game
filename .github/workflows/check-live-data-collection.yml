name: One-off - Check live data collection on oukkhmer.web.app
on: workflow_dispatch
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install playwright@1.48.0
      - run: npx playwright install --with-deps chromium
      - name: Load the live site and watch Firestore traffic
        run: |
          cat > check.js <<'SCRIPT'
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            const errors = [];
            page.on('console', m => { if (m.type() === 'error') errors.push(m.text()); });
            page.on('pageerror', e => errors.push(String(e)));
            const firestoreCalls = [];
            page.on('response', async (res) => {
              const url = res.url();
              if (url.includes('firestore.googleapis.com')) {
                firestoreCalls.push({ url: url.slice(0, 200), status: res.status() });
              }
            });
            await page.goto('https://oukkhmer.web.app/', { waitUntil: 'networkidle', timeout: 30000 });
            await page.waitForTimeout(5000);
            const puzzleLevels = await page.evaluate(() => window.__ouk && window.__ouk.puzzleLevels ? window.__ouk.puzzleLevels() : null);
            console.log('PUZZLE LEVELS ON LIVE SITE:', JSON.stringify(puzzleLevels));
            console.log('CONSOLE/PAGE ERRORS:', JSON.stringify(errors, null, 2));
            console.log('FIRESTORE CALLS:', JSON.stringify(firestoreCalls, null, 2));
            await browser.close();
          })();
          SCRIPT
          node check.js
