name: One-off - Deploy Firestore security rules
on: workflow_dispatch
jobs:
  deploy_rules:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
      - name: Deploy Firestore rules via Rules REST API
        run: |
          set -euo pipefail
          PROJECT=khmer-ouk-datacollection
          TOKEN=$(gcloud auth application-default print-access-token)

          PAYLOAD=$(jq -n --rawfile content firestore.rules \
            '{source:{files:[{name:"firestore.rules", content:$content}]}}')

          CREATE_RESP=$(curl -sS -X POST \
            -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://firebaserules.googleapis.com/v1/projects/$PROJECT/rulesets")
          echo "$CREATE_RESP"
          RULESET_NAME=$(echo "$CREATE_RESP" | jq -r '.name')
          if [ -z "$RULESET_NAME" ] || [ "$RULESET_NAME" = "null" ]; then
            echo "Failed to create ruleset" >&2
            exit 1
          fi

          RELEASE_PAYLOAD=$(jq -n --arg ruleset "$RULESET_NAME" \
            '{release:{rulesetName:$ruleset}, updateMask:"rulesetName"}')
          RELEASE_RESP=$(curl -sS -X PATCH \
            -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" \
            -d "$RELEASE_PAYLOAD" \
            "https://firebaserules.googleapis.com/v1/projects/$PROJECT/releases/cloud.firestore")
          echo "$RELEASE_RESP"
          echo "$RELEASE_RESP" | jq -e --arg ruleset "$RULESET_NAME" '.rulesetName == $ruleset'
