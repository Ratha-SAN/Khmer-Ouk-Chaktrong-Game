name: Create online-match test accounts (one-off)
on:
  workflow_dispatch:

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - name: Install Playwright
        run: |
          npm init -y >/dev/null 2>&1
          npm install playwright@1.47.0 >/dev/null 2>&1
          npx playwright install --with-deps chromium

      - name: Diagnose the raw Firebase error code for email sign-up
        run: |
          cat > test.js <<'EOF'
          const { chromium } = require('playwright');

          async function main() {
            const browser = await chromium.launch();
            const context = await browser.newContext();
            const page = await context.newPage();
            page.on('pageerror', err => console.log('[pageerror]', String(err)));
            page.on('console', msg => { if (msg.type() === 'warning' || msg.type() === 'error') console.log(`[console.${msg.type()}]`, msg.text()); });
            await page.goto('https://oukkhmer.web.app/', { waitUntil: 'load', timeout: 45000 });
            await page.waitForTimeout(3000);

            const result = await page.evaluate(() => {
              return window.__oukAuth.signUpEmail('oukhtest.alice@example.com', 'OukTest123!')
                .then(() => ({ ok: true }))
                .catch((err) => ({ ok: false, code: err && err.code, message: err && err.message }));
            });
            console.log('RAW RESULT:', JSON.stringify(result));

            await browser.close();
          }
          main().catch((e) => { console.error(e); process.exit(1); });
          EOF
          node test.js
