name: Diagnose Apple sign-in error (one-off)
on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Install Playwright
        run: |
          npm init -y >/dev/null 2>&1
          npm install playwright@1.47.0 >/dev/null 2>&1
          npx playwright install --with-deps chromium

      - name: Trigger Apple sign-in on the live site and capture the raw Firebase error
        run: |
          cat > test.js <<'EOF'
          const { chromium } = require('playwright');

          async function main() {
            const browser = await chromium.launch();
            const context = await browser.newContext();
            const page = await context.newPage();
            const errors = [];
            page.on('pageerror', (e) => errors.push(String(e)));
            page.on('console', (m) => { if (m.type() === 'error' || m.type() === 'warning') errors.push(m.type() + ': ' + m.text()); });

            await page.goto('https://oukkhmer.web.app/', { waitUntil: 'load' });
            await page.waitForTimeout(3000);
            await page.click('#startBtn');
            await page.waitForTimeout(500);

            const popupPromise = context.waitForEvent('page', { timeout: 8000 }).catch(() => null);
            const timeout = new Promise((resolve) => setTimeout(() => resolve({ ok: false, code: 'TIMEOUT' }), 8000));
            const call = page.evaluate(() => window.__oukAuth.signInApple()
              .then(() => ({ ok: true }))
              .catch((err) => ({ ok: false, code: err && err.code, message: err && err.message })));
            const result = await Promise.race([call, timeout]);
            console.log('signInApple RESULT:', JSON.stringify(result));

            const popup = await popupPromise;
            if (popup) {
              await popup.waitForLoadState('domcontentloaded').catch(() => {});
              await popup.waitForTimeout(2000);
              console.log('POPUP URL:', popup.url());
              const bodyText = await popup.evaluate(() => document.body ? document.body.innerText.slice(0, 500) : '').catch(() => '(could not read body)');
              console.log('POPUP BODY TEXT:', JSON.stringify(bodyText));
              await popup.close().catch(() => {});
            } else {
              console.log('NO POPUP EVENT SEEN');
            }

            console.log('CONSOLE/PAGE MESSAGES:', JSON.stringify(errors));

            await browser.close();
          }
          main().catch((e) => { console.error(e); process.exit(1); });
          EOF
          node test.js
