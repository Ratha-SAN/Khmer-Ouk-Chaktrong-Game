name: Update online-match test account passwords (one-off)
on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Install Playwright
        run: |
          npm init -y >/dev/null 2>&1
          npm install playwright@1.47.0 >/dev/null 2>&1
          npx playwright install --with-deps chromium

      - name: Sign in and set new password on the live site
        run: |
          cat > test.js <<'EOF'
          const { chromium } = require('playwright');

          const ACCOUNTS = [
            { email: 'oukhtest.alice@example.com', password: 'OukTest123!' },
            { email: 'oukhtest.bob@example.com', password: 'OukTest123!' },
          ];
          const NEW_PASSWORD = '123456';

          // Firebase auth calls can take a few seconds on a CI runner --
          // poll for either outcome instead of guessing a fixed delay.
          async function waitForAuthOutcome(page, timeoutMs) {
            const deadline = Date.now() + timeoutMs;
            while (Date.now() < deadline) {
              const state = await page.evaluate(() => ({
                modeScreenVisible: document.getElementById('modeScreen').style.display === 'flex',
                errText: document.getElementById('loginError').style.display === 'block'
                  ? document.getElementById('loginError').textContent : null,
              }));
              if (state.modeScreenVisible || state.errText) return state;
              await page.waitForTimeout(300);
            }
            return { modeScreenVisible: false, errText: null };
          }

          async function updateOne(browser, acct) {
            const context = await browser.newContext();
            const page = await context.newPage();
            page.on('pageerror', err => console.log(`[${acct.email} pageerror]`, String(err)));
            await page.goto('https://oukkhmer.web.app/', { waitUntil: 'load', timeout: 45000 });
            await page.waitForTimeout(2000);
            await page.click('#startBtn');
            await page.waitForTimeout(300);
            await page.click('#signupEmailBtn');
            await page.waitForTimeout(300);
            await page.fill('#loginEmail', acct.email);
            await page.fill('#loginEmailPassword', acct.password);
            await page.click('#loginEmailSubmitBtn');
            let { modeScreenVisible, errText } = await waitForAuthOutcome(page, 8000);
            console.log('DEBUG', acct.email, 'signup attempt:', JSON.stringify({ modeScreenVisible, errText }));

            // These accounts already exist (created in an earlier one-off
            // run) -- the sign-up attempt above is expected to fail with
            // "already has an account", so fall back to signing in instead.
            if (!modeScreenVisible && errText && errText.includes('already has an account')) {
              await page.click('#loginEmailToggleModeBtn');
              const modeAfterToggle = await page.evaluate(() => document.getElementById('loginEmailSubmitBtn').textContent);
              console.log('DEBUG', acct.email, 'submit button after toggle:', modeAfterToggle);
              await page.waitForTimeout(200);
              await page.click('#loginEmailSubmitBtn');
              ({ modeScreenVisible, errText } = await waitForAuthOutcome(page, 8000));
              console.log('DEBUG', acct.email, 'signin attempt:', JSON.stringify({ modeScreenVisible, errText }));
            }

            if (!modeScreenVisible) {
              console.log('SUMMARY', acct.email, JSON.stringify({ ok: false, step: 'sign-in', errText }));
              await context.close();
              return;
            }

            const result = await page.evaluate((newPw) => {
              return firebase.auth().currentUser.updatePassword(newPw)
                .then(() => ({ ok: true }))
                .catch((err) => ({ ok: false, code: err.code, message: err.message }));
            }, NEW_PASSWORD);
            console.log('SUMMARY', acct.email, JSON.stringify(result));
            await context.close();
          }

          async function main() {
            const browser = await chromium.launch();
            for (const acct of ACCOUNTS) {
              await updateOne(browser, acct);
            }
            await browser.close();
          }
          main().catch((e) => { console.error(e); process.exit(1); });
          EOF
          node test.js
