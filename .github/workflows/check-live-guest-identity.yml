name: One-off - Check live guest identity (Firebase Anonymous Auth)
on: workflow_dispatch
jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
      - name: Check current Identity Toolkit sign-in config
        run: |
          set -euo pipefail
          PROJECT=khmer-ouk-datacollection
          TOKEN=$(gcloud auth application-default print-access-token)
          echo "Current config:"
          curl -sS -H "Authorization: Bearer $TOKEN" \
            "https://identitytoolkit.googleapis.com/v2/projects/$PROJECT/config" | jq '.signIn // .'
      - name: Try to enable Anonymous sign-in
        run: |
          set -euo pipefail
          PROJECT=khmer-ouk-datacollection
          TOKEN=$(gcloud auth application-default print-access-token)
          curl -sS -X PATCH \
            -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" \
            -d '{"signIn":{"anonymous":{"enabled":true}}}' \
            "https://identitytoolkit.googleapis.com/v2/projects/$PROJECT/config?updateMask=signIn.anonymous.enabled"
