name: Verify online multiplayer + stats deploy (one-off)
on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Install Playwright
        run: |
          npm init -y >/dev/null 2>&1
          npm install playwright@1.47.0 >/dev/null 2>&1
          npx playwright install --with-deps chromium

      - name: Debug the code-based host/join path with console + error capture
        run: |
          cat > test.js <<'EOF'
          const { chromium } = require('playwright');

          async function loginAsGuest(context, label) {
            const page = await context.newPage();
            page.on('console', msg => console.log(`[${label} console.${msg.type()}]`, msg.text()));
            page.on('pageerror', err => console.log(`[${label} pageerror]`, String(err)));
            for (let attempt = 1; attempt <= 3; attempt++) {
              try {
                await page.goto('https://oukkhmer.web.app/', { waitUntil: 'load', timeout: 45000 });
                break;
              } catch (e) {
                console.log(label, 'goto attempt', attempt, 'failed:', e.message);
                if (attempt === 3) throw e;
              }
            }
            await page.waitForTimeout(2500);
            await page.click('#startBtn');
            await page.waitForTimeout(300);
            await page.click('#loginSubmitBtn');
            await page.waitForTimeout(1200);
            return page;
          }

          async function goToOnlineIdle(page) {
            await page.click('#pickPlay');
            await page.waitForTimeout(200);
            await page.click('#pickOnline');
            await page.waitForTimeout(200);
          }

          async function readMatchState(page) {
            return page.evaluate(() => ({
              mode: window.__ouk.currentMode(),
              side: window.__ouk.currentSide(),
              boardState: window.__ouk.currentMode() === 'online' ? JSON.stringify(window.__ouk.state()) : null,
            }));
          }

          async function main() {
            const browser = await chromium.launch();
            const ctxC = await browser.newContext();
            const ctxD = await browser.newContext();
            const pageC = await loginAsGuest(ctxC, 'C');
            const pageD = await loginAsGuest(ctxD, 'D');
            await goToOnlineIdle(pageC);
            await goToOnlineIdle(pageD);

            const uidC = await pageC.evaluate(() => window.firebase && firebase.auth().currentUser ? firebase.auth().currentUser.uid : null);
            console.log('UID C:', uidC);

            await pageC.click('#onlineHostCodeBtn');
            await pageC.waitForTimeout(2500);
            const code = await pageC.evaluate(() => document.getElementById('onlineCodeValue').textContent.trim());
            const lobbyIdC = await pageC.evaluate(() => window.onlineLobbyId || null).catch(() => null);
            console.log('HOST CODE:', code, 'lobbyIdC (via window, likely undefined since not exposed):', lobbyIdC);

            const uidD = await pageD.evaluate(() => window.firebase && firebase.auth().currentUser ? firebase.auth().currentUser.uid : null);
            console.log('UID D:', uidD);

            await pageD.fill('#onlineCodeInput', code);
            await pageD.click('#onlineJoinCodeBtn');

            // Poll client C every second for up to 15s watching for the mode flip.
            let flipped = false;
            for (let i = 0; i < 15; i++) {
              await pageC.waitForTimeout(1000);
              const m = await pageC.evaluate(() => window.__ouk.currentMode());
              console.log('C mode at t+' + (i + 1) + 's:', m);
              if (m === 'online') { flipped = true; break; }
            }

            const cC = await readMatchState(pageC);
            const cD = await readMatchState(pageD);
            console.log('FINAL C:', JSON.stringify({ ...cC, boardState: cC.boardState ? 'present' : null }));
            console.log('FINAL D:', JSON.stringify({ ...cD, boardState: cD.boardState ? 'present' : null }));
            console.log('HOST FLIPPED TO ONLINE:', flipped);

            await browser.close();
          }
          main().catch((e) => { console.error(e); process.exit(1); });
          EOF
          node test.js
