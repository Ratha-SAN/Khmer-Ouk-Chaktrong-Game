name: Verify online multiplayer + stats deploy (one-off)
on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Install Playwright
        run: |
          npm init -y >/dev/null 2>&1
          npm install playwright@1.47.0 >/dev/null 2>&1
          npx playwright install --with-deps chromium

      - name: Two real guest clients try to quick-match each other on the live site
        run: |
          cat > test.js <<'EOF'
          const { chromium } = require('playwright');

          async function loginAsGuest(context) {
            const page = await context.newPage();
            await page.goto('https://oukkhmer.web.app/', { waitUntil: 'load' });
            await page.waitForTimeout(2500);
            await page.click('#startBtn');
            await page.waitForTimeout(300);
            await page.click('#loginSubmitBtn');
            await page.waitForTimeout(1200);
            return page;
          }

          async function main() {
            const browser = await chromium.launch();
            const ctxA = await browser.newContext();
            const ctxB = await browser.newContext();
            const pageA = await loginAsGuest(ctxA);
            const pageB = await loginAsGuest(ctxB);

            // --- Profile stats UI sanity check (client A) ---
            await pageA.click('#modeProfileChip').catch(() => {});
            await pageA.waitForTimeout(400);
            const statsInfo = await pageA.evaluate(() => ({
              profileVisible: document.getElementById('profileScreen').style.display,
              statsSummaryExists: !!document.getElementById('statsSummary'),
              statsEmptyText: document.getElementById('statsEmpty') ? document.getElementById('statsEmpty').textContent : null,
              statsEmptyVisible: document.getElementById('statsEmpty') ? getComputedStyle(document.getElementById('statsEmpty')).display : null,
            }));
            console.log('PROFILE STATS UI:', JSON.stringify(statsInfo));
            await pageA.click('#profileCloseBtn').catch(() => {});
            await pageA.waitForTimeout(200);

            // --- Online matchmaking: both clients hit Quick Match ---
            for (const p of [pageA, pageB]) {
              await p.click('#pickPlay');
              await p.waitForTimeout(200);
              await p.click('#pickOnline');
              await p.waitForTimeout(200);
            }

            await pageA.click('#onlineQuickBtn');
            await pageA.waitForTimeout(500);
            await pageB.click('#onlineQuickBtn');

            // Give the lobby claim + match creation a few seconds to settle.
            await pageA.waitForTimeout(6000);

            const stateA = await pageA.evaluate(() => ({
              searching: getComputedStyle(document.getElementById('onlineSearching')).display,
              errorText: document.getElementById('onlineError').textContent,
              errorVisible: getComputedStyle(document.getElementById('onlineError')).display !== 'none',
              inPlay: document.getElementById('modeScreen').style.display === 'none',
              boardVisible: !!document.getElementById('boardHost') && getComputedStyle(document.getElementById('boardHost')).display !== 'none',
            }));
            const stateB = await pageB.evaluate(() => ({
              searching: getComputedStyle(document.getElementById('onlineSearching')).display,
              errorText: document.getElementById('onlineError').textContent,
              errorVisible: getComputedStyle(document.getElementById('onlineError')).display !== 'none',
              inPlay: document.getElementById('modeScreen').style.display === 'none',
            }));
            console.log('CLIENT A STATE:', JSON.stringify(stateA));
            console.log('CLIENT B STATE:', JSON.stringify(stateB));

            if (stateA.inPlay && stateB.inPlay) {
              console.log('MATCH SUCCEEDED: both clients entered play.');
              // Try a move sync check: A moves, confirm B's turn indicator/state changes.
              const beforeTurnB = await pageB.evaluate(() => window.__ouk ? window.__ouk.uiMode() : null);
              console.log('pre-move uiMode B:', beforeTurnB);
            } else {
              console.log('MATCH DID NOT COMPLETE (expected if firestore.rules for lobbies/matches has not been published to the live project yet).');
            }

            await browser.close();
          }
          main().catch((e) => { console.error(e); process.exit(1); });
          EOF
          node test.js
